<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Painel Zigos - Gestão</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 fill=%22%23106B3A%22 font-family=%22sans-serif%22 font-weight=%22bold%22>ZIG</text></svg>">
</head>
<body>

<header>
    <div class="header-top">
        <h1>Painel Zigos</h1>
        <div class="header-controls">
            <div id="btn-admin-secret" class="system-status" onclick="app.toggleAdmin()" title="Clique para liberar acesso Admin">
                <span class="status-dot"></span> Sistema Online
            </div>
        </div>
    </div>

    <nav class="nav-tabs" id="nav-menu">
        <button class="nav-btn active" onclick="app.switchTab('vendas', event)">Registrar</button>
        <button class="nav-btn" onclick="app.switchTab('lavagem', event)">Calculadora</button>
        <button class="nav-btn" onclick="app.switchTab('acoes', event)">Ações</button>
        <button class="nav-btn" onclick="app.switchTab('divulgacao', event)">Divulgação</button>
    </nav>
</header>

<div id="vendas" class="section active">
    <div class="row">
        <div class="col">
            <div class="card">
                <h2>Registrar Lavagem</h2>
                <div class="row" id="area-vendedor-info">
                    <div class="col form-group"><label>Lavador / Responsável</label><input type="text" id="venda-vendedor" placeholder="Seu Nome..." autocomplete="off"></div>
                    <div class="col form-group"><label>Cliente / Origem do Dinheiro</label><input type="text" id="venda-faccao" placeholder="Nome/Facção..." autocomplete="off"></div>
                </div>
                <div class="row">
                    <div class="col form-group"><label>Data</label><input type="date" id="venda-data"></div>
                    <div class="col form-group"><label>Horário</label><input type="time" id="venda-hora"></div>
                </div>

                <hr class="separator">

                <div class="form-group">
                    <label>SELECIONE A OPERAÇÃO:</label>
                    <div id="sales-catalog" class="catalog-container"></div>
                </div>

                <div id="price-controls" class="hidden-controls">
                    <div class="row">
                        <div class="col form-group"><label>Valor a Lavar (R$)</label><input type="text" id="venda-valor" placeholder="Ex: 1.000.000" oninput="app.maskCurrency(event)"></div>
                    </div>
                    <button class="btn btn-outline" id="btn-add-cart" onclick="app.addToCart()">+ ADICIONAR AO CARRINHO</button>
                </div>
                <div id="select-msg" class="text-center text-muted italic mt-15">Selecione uma operação acima...</div>
            </div>
        </div>

        <div class="col">
            <div class="card card-cart" id="area-carrinho">
                <div class="cart-header">
                    <h2>Carrinho de Lavagem</h2>
                    <button class="btn-clear" onclick="app.clearCart()">Limpar</button>
                </div>
                
                <div id="cart-items" class="cart-body">
                    <p class="empty-msg">Nenhuma operação adicionada</p>
                </div>

                <div id="cart-summary-area"></div>
                
                <button class="btn btn-primary mt-20 btn-glow" onclick="app.sendSaleWebhook()">
                    FINALIZAR E REGISTRAR
                </button>

                <div class="mt-30 border-top pt-20" id="area-producao">
                    <button class="btn btn-secondary btn-glow" onclick="app.calculateCartProduction()">
                        Calcular Materiais
                    </button>

                    <div id="cart-production-area" class="production-summary-box hidden mt-20">
                        <div class="prod-box-header">
                            <h3 class="summary-title-styled">Resumo de Materiais</h3>
                            <button class="btn-close-box" onclick="app.closeProduction()">✖</button>
                        </div>
                        
                        <div id="mats-list-display" class="tags-container mb-15"></div>
                        
                        <h4 class="text-muted text-center mb-10 text-sub uppercase">Custo por Operação:</h4>
                        <div id="sales-production-details" class="flex-column gap-10"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div id="lavagem" class="section">
    <div class="wash-grid-container">
        <div class="card">
            <h3 style="color: var(--primary); text-transform: uppercase; margin-bottom: 15px; text-align: center;">Lavagem 35%</h3>
            <div class="form-group">
                <label>Valor para Lavar (R$)</label>
                <input type="text" id="w35-input" placeholder="Ex: 1.000.000" oninput="app.maskCurrency(event); app.calcWash('35')">
                <div id="w35-mats" class="wash-mats-info">Materiais: 0 Papel | 0 Tinta</div>
            </div>
            <div class="wash-results">
                <div class="wash-item"><span>Máquina</span><b id="w35-maq">R$ 0,00</b></div>
                <div class="wash-item"><span>Lucro</span><b id="w35-luc">R$ 0,00</b></div>
                <div class="wash-item"><span>Caixa</span><b id="w35-cax">R$ 0,00</b></div>
                <div class="wash-item"><span>Comissão</span><b id="w35-com">R$ 0,00</b></div>
